<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ugo Ventura | QA de Acessibilidade</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="main-header"></header>

    <main id="conteudo-principal">
        <section class="hero" data-aos="fade-up">
            <img src="images/ugo.jpg" alt="Foto de perfil de Ugo Ventura" class="perfil-img">
            <h1 data-aos="fade-right">Ugo Ventura</h1>
            <p class="subtitulo">Especialista em QA de Acessibilidade</p>
        </section>

        <section class="destaques">
            <h2 data-aos="fade-left">Destaques</h2>
            <div class="card-grid">
                <article class="card" data-aos="zoom-in">
                    <i class="fab fa-youtube" aria-hidden="true" style="font-size: 2rem; color: red;"></i>
                    <h3>Vídeo em Destaque</h3>
                    <p>Assista ao meu conteúdo sobre acessibilidade digital no YouTube.</p>
                    <a href="https://www.youtube.com/watch?v=UW9lQev63oY" target="_blank" aria-label="Assistir vídeo de Ugo Ventura no YouTube (abre em nova aba)">
                        Assistir no YouTube
                    </a>
                </article>

                <article class="card" data-aos="zoom-in" data-delay="200">
                    <i class="fab fa-linkedin" aria-hidden="true" style="font-size: 2rem; color: #0077b5;"></i>
                    <h3>Meu LinkedIn</h3>
                    <p>Acompanhe meus artigos e conexões profissionais.</p>
                    <a href="https://www.linkedin.com/in/ugo-rocha-ventura-97335a68/" target="_blank" aria-label="Visitar perfil de Ugo Ventura no LinkedIn (abre em nova aba)">
                        Ver Perfil
                    </a>
                </article>
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Inicializa as animações prevenindo erros em dispositivos antigos
        try {
            AOS.init({
                duration: 1000,
                once: true,
                disable: 'mobile' // Opcional: desativa animações em celulares muito lentos se desejar
            });
        } catch (e) {
            console.log("Erro ao carregar animações, o site continuará funcionando normalmente.");
        }
    </script>

    <script src="js/menu.js"></script>
</body>
</html>
